<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<section class="bg-[rgba(73,76,79,1)] dark:bg-gray-900">
  <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">
      <a href="#" class="flex items-center mb-6 text-2xl font-semibold text-white">
          <img class="w-8 h-8 mr-2" src="images/logo.svg" alt="logo">
          RED PRODUCT
      </a>
      <div class="w-full lg:w-[484px] p-6 bg-white rounded-lg shadow sm:p-8">
          <h1 class="mb-1 text-xl font-extrabold text-gray-900 md:text-2xl">
            Nouveau mot de passe
          </h1>
          <p class="text-gray-500 mb-4">Entrez votre nouveau mot de passe ci-dessous.</p>

          <form id="resetForm" class="space-y-4">
              <div>
                  <label class="block mb-2 text-sm font-medium text-gray-500">Nouveau mot de passe</label>
                  <input type="password" id="password" class="bg-gray-50 border-b-2 border-gray-300 text-gray-900 text-sm focus:outline-none block w-full p-2.5" required minlength="6">
              </div>
              <div>
                  <label class="block mb-2 text-sm font-medium text-gray-500">Confirmer le mot de passe</label>
                  <input type="password" id="confirm" class="bg-gray-50 border-b-2 border-gray-300 text-gray-900 text-sm focus:outline-none block w-full p-2.5" required>
              </div>
              <p id="successMsg" class="text-green-600 text-sm hidden"></p>
              <p id="errorMsg"   class="text-red-500   text-sm hidden"></p>
              <button type="submit" class="w-full text-white bg-[rgba(73,76,79,1)] hover:bg-gray-700 font-medium rounded-lg text-sm px-5 py-2.5 text-center">
                Enregistrer
              </button>
          </form>
      </div>
      <div class="mt-6 text-sm text-white">
        <a class="text-[rgba(225,217,100,1)] hover:underline" href="index.html">← Retour à la connexion</a>
      </div>
  </div>
</section>

<script>
const API_URL = 'http://localhost:5000/api';

// Récupérer le token depuis l'URL (?token=xxx)
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

if (!token) {
  document.getElementById('errorMsg').textContent = 'Lien invalide ou expiré.';
  document.getElementById('errorMsg').classList.remove('hidden');
}

document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const successMsg = document.getElementById('successMsg');
  const errorMsg   = document.getElementById('errorMsg');
  successMsg.classList.add('hidden');
  errorMsg.classList.add('hidden');

  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;

  if (password !== confirm) {
    errorMsg.textContent = '❌ Les mots de passe ne correspondent pas.';
    errorMsg.classList.remove('hidden');
    return;
  }

  try {
    const res  = await fetch(`${API_URL}/auth/reset-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();

    if (res.ok) {
      successMsg.textContent = '✅ Mot de passe réinitialisé ! Redirection...';
      successMsg.classList.remove('hidden');
      setTimeout(() => window.location.href = 'index.html', 2500);
    } else {
      errorMsg.textContent = '❌ ' + (data.message || 'Erreur.');
      errorMsg.classList.remove('hidden');
    }
  } catch (err) {
    errorMsg.textContent = '❌ Erreur de connexion au serveur.';
    errorMsg.classList.remove('hidden');
  }
});
</script>
</body>
</html>
