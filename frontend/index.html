<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED PRODUCT</title>
  <script src="https://cdn.tailwindcss.com"></script>


</head>
<body>
    



<section class="bg-[rgba(73,76,79,1)] dark:bg-gray-900">
  <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">
        <a href="#" class="flex items-center mb-6 text-2xl font-semibold  dark:text-white">
          <img src="./images/logo.svg" alt="logo" class="w-8 h-8 mr-2">
         <p class="text-[#FFFFFF]">RED-PRODUCT</p>
        </a>
      <div class="w-full  sm:h-[424.25px] bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700">
          <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
                <h1 class="text-lg font-semibold leading-tight tracking-tight text-gray-900 md:text-xl dark:text-white">
                  Connectez-vous en tant que Admin
                </h1>
              <form id="loginForm" class="space-y-4 md:space-y-6" action="#">
                  <div class="mb-8">
                        <label for="email" class="sr-only">E-mail</label>
                        <input type="email" name="email" id="email" class=" border-b border-b-[2px] border-gray-300 text-gray-900  focus:outline-none focus:ring-0  w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="E-mail" required>
                  </div>
                  <div class="mb-8">
                        <label for="password" class="sr-only">Mot de passe</label>
                        <input type="password" name="password" id="password" placeholder="Mot de passe" class=" border-b border-b-[2px] border-gray-300 text-gray-900    block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" required>
                  </div>
                  <div class="flex items-center justify-between">
                      <div class="flex items-start m-6">
                          <div class="flex items-center h-5 mt-2">
                            <input id="remember" aria-describedby="remember" type="checkbox" class="w-4 h-4 border-b border-gray-300 rounded  bg-gray-50 focus:outline-none focus:ring-0 dark:bg-gray-700 dark:border-gray-600 dark:focus:ring-primary-600 dark:ring-offset-gray-800">
                          </div>
                          <div class="ml-3 text-sm ">
                            <label for="remember" class="text-sm text-gray-500 dark:text-gray-300 font-semibold ml-2">Gardez-moi connecté</label>
                          </div>
                      </div>
                  </div>
                  <button type="submit"
                  class="w-full text-white bg-[#45484B] hover:bg-primary-700 focus:ring-4 focus:outline-none
                   focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-primary-600 dark:hover:bg-primary-700 
                   dark:focus:ring-primary-800 ">Se connecter</button>
            

              </form>

          </div>
      </div>
                <a href="mot-de-passe-oub.html" class="text-sm font-medium text-primary-600 hover:underline dark:text-primary-500 text-[rgba(225,217,100,1)]">Mot de passe oublié?</a>

                <p class="text-sm font-light  dark:text-gray-400 text-[#FFFFFF]">
                      Vous n'avez pas de compte? <a href="inscription.html" class="font-medium text-primary-600 hover:underline dark:text-primary-500 text-[rgba(225,217,100,1)]">S'inscrire</a>
                </p>
  </div>
</section>


  <script src="index.js"></script>
</body>
</html>
